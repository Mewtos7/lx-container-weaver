name: ADR Enforcement

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-adr-reference:
    name: Check ADR reference for architecture-impacting changes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for ADR reference on architecture-impacting changes
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch the list of files changed in this PR
          changed_files=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json files --jq '.files[].path')

          # Architecture-impacting path patterns (extended when source code is added)
          arch_patterns=(
            "^src/"
            "^cmd/"
            "^internal/"
            "^pkg/"
            "^api/"
            "^\.github/workflows/"
          )

          arch_changed=false
          for file in $changed_files; do
            for pattern in "${arch_patterns[@]}"; do
              if echo "$file" | grep -qE "$pattern"; then
                arch_changed=true
                echo "Architecture-impacting file detected: $file"
                break 2
              fi
            done
          done

          if [[ "$arch_changed" == "false" ]]; then
            echo "✅ No architecture-impacting files changed. ADR check skipped."
            exit 0
          fi

          # Check whether an ADR file is included in the PR
          for file in $changed_files; do
            if echo "$file" | grep -qE "^docs/adr/"; then
              echo "✅ ADR file included in this PR: $file"
              exit 0
            fi
          done

          # Check whether the PR title or body references an existing ADR
          combined="$PR_TITLE $PR_BODY"
          if echo "$combined" | grep -qiE 'ADR-[0-9]{3}'; then
            echo "✅ ADR reference found in PR title or description."
            exit 0
          fi

          echo ""
          echo "❌ This PR contains architecture-impacting changes but does not reference an ADR."
          echo ""
          echo "Please do one of the following:"
          echo "  • Add or update an ADR under docs/adr/ (see ADR-001 for the template), or"
          echo "  • Reference an existing ADR (e.g., 'ADR-003') in the PR title or description."
          echo ""
          echo "See CONTRIBUTING.md for guidance on when an ADR is required."
          exit 1
